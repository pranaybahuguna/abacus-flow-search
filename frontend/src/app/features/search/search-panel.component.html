<aside class="panel">
  <!-- Search input -->
  <div class="sect">
    <div class="box" [class.active]="query()">
      <span class="si">⌕</span>
      <input [ngModel]="query()" (ngModelChange)="onInput($event)"
             (keydown.enter)="onEnter()" placeholder="Search processes, flows &amp; systems…"
             autocomplete="off" spellcheck="false"/>
      <div class="spin" *ngIf="loading()"></div>
    </div>
    <button class="btn-s" (click)="onEnter()" [disabled]="loading()||!query().trim()">SEARCH →</button>
  </div>

  <!-- Quick examples — collapsible -->
  <div class="sect" [class.sect-collapsed]="quickCollapsed()">
    <button class="lbl lbl-toggle" (click)="quickCollapsed.update(v => !v)">
      QUICK QUERIES
      <span class="lbl-chevron">{{quickCollapsed() ? '›' : '‹'}}</span>
    </button>
    <ng-container *ngIf="!quickCollapsed()">
      <div *ngFor="let grp of exampleGroups" class="eg">
        <div class="eg-lbl">{{grp.label}}</div>
        <div class="chips">
          <button *ngFor="let ex of grp.items" class="chip" (click)="useExample(ex)">{{ex}}</button>
        </div>
      </div>
    </ng-container>
  </div>

  <!-- Confidence badge — compact, dismissible -->
  <div class="tier-badge" *ngIf="tc() && !tierDismissed()"
       [style.border-left-color]="tc()!.color">
    <span class="tb-icon" [style.color]="tc()!.color">{{tc()!.icon}}</span>
    <span class="tb-label" [style.color]="tc()!.color">{{tc()!.label}}</span>
    <span class="tb-sep">·</span>
    <span class="tb-msg">{{response()?.message}}</span>
    <button class="tb-close" (click)="dismissTier()" title="Dismiss">×</button>
  </div>

  <!-- Candidate list -->
  <div class="sect results" *ngIf="response()?.candidates?.length">
    <div class="lbl">MATCHES</div>
    <div *ngFor="let c of response()!.candidates; trackBy:track"
         class="cand" [class.active]="activeId()===c.entity_id" (click)="pick(c)">
      <div class="ch">
        <span class="cn">{{c.name}}</span>
        <span class="cs" [style.color]="scoreColor(c.score)">{{(c.score*100).toFixed(0)}}%</span>
      </div>
      <div class="cm">{{c.entity_type.replace('_',' ').toUpperCase()}}@if(c.domain){ · {{c.domain}}}</div>
      <div class="bar"><div [style.width.%]="c.score*100" [style.background]="scoreColor(c.score)"></div></div>
    </div>
  </div>

  <!-- Empty -->
  <div class="empty" *ngIf="!loading()&&!response()">
    <span class="ei">◈</span><span>search to explore</span>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn-f" (click)="loadFull()">◈ FULL ENTERPRISE MAP</button>
  </div>
</aside>
